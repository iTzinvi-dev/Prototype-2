<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ─── RENDERER ─── */
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('c'),
  antialias: false,
  alpha: false,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000005, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 55, 160);
camera.lookAt(0, 0, 0);

/* ─── SHADER MATERIAL ─── */
const mat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
  uniforms: {
    uTime:  { value: 0 },
    uDPR:   { value: renderer.getPixelRatio() },
    uMouse: { value: new THREE.Vector2(0, 0) },
    uForce: { value: 0 }
  },
  vertexShader: `
    uniform float uTime;
    uniform float uDPR;
    uniform vec2  uMouse;
    uniform float uForce;

    attribute float aSize;
    attribute float aAngle;
    attribute float aRadius;
    attribute float aY;
    attribute float aSpeed;
    attribute vec3  aColor;

    varying vec3 vColor;
    varying float vAlpha;

    void main() {
      // Orbital motion — each particle orbits at its own speed
      float angle = aAngle + uTime * aSpeed;
      vec3 pos = vec3(
        aRadius * cos(angle),
        aY,
        aRadius * sin(angle)
      );

      // Mouse distortion in world space (projected to XZ plane)
      vec2 mWorld = uMouse * vec2(110.0, 80.0);
      float dx = pos.x - mWorld.x;
      float dz = pos.z - mWorld.y;
      float dist = sqrt(dx*dx + dz*dz);
      float bubble = exp(-dist * dist / 800.0) * uForce;

      // Lift particles away from mouse + slight swirl
      pos.y  += bubble * 22.0;
      pos.x  += -dz * bubble * 0.06;
      pos.z  += dx  * bubble * 0.06;

      vec4 mv = modelViewMatrix * vec4(pos, 1.0);
      float twinkle = 0.75 + 0.25 * sin(uTime * 2.8 + aAngle * 17.3 + aRadius * 0.4);

      gl_PointSize = aSize * twinkle * uDPR * (280.0 / -mv.z);
      gl_Position  = projectionMatrix * mv;

      vColor = aColor;
      // Fade outer halo, full brightness inner ring
      vAlpha = (0.5 + 0.5 * (1.0 - smoothstep(30.0, 90.0, aRadius))) * twinkle;
    }
  `,
  fragmentShader: `
    varying vec3  vColor;
    varying float vAlpha;

    void main() {
      vec2  uv = gl_PointCoord - 0.5;
      float d  = length(uv);
      if (d > 0.5) discard;

      // Bright hot core, soft glow edge
      float core = 1.0 - smoothstep(0.0, 0.18, d);
      float glow = 1.0 - smoothstep(0.0, 0.50, d);
      float a    = core * 0.9 + glow * 0.55;

      vec3 col = vColor + core * 0.6; // bloom the core white
      gl_FragColor = vec4(col * a, a * vAlpha);
    }
  `
});

/* ─── GEOMETRY ─── */
const N = 22000;
const geo = new THREE.BufferGeometry();

const aSize   = new Float32Array(N);
const aAngle  = new Float32Array(N);
const aRadius = new Float32Array(N);
const aY      = new Float32Array(N);
const aSpeed  = new Float32Array(N);
const aColor  = new Float32Array(N * 3);

// Palette
const palettes = [
  new THREE.Color(0xffd580), // warm gold
  new THREE.Color(0x7fc8ff), // ice blue
  new THREE.Color(0xffa0d0), // blush
  new THREE.Color(0xaaffee), // mint
  new THREE.Color(0xffffff), // star white
];

for (let i = 0; i < N; i++) {
  const t = i / N;

  // Arm count: 3 spiral arms with noise
  const arm     = Math.floor(Math.random() * 3);
  const armBase = (arm / 3) * Math.PI * 2;

  // Core vs ring vs halo distribution
  let radius, ySpread;
  const roll = Math.random();
  if (roll < 0.06) {
    // Bright nucleus
    radius  = Math.pow(Math.random(), 3) * 10;
    ySpread = 2;
  } else if (roll < 0.78) {
    // Main disk — spiral arms bias
    radius  = 14 + Math.pow(Math.random(), 0.7) * 52;
    ySpread = 4 + (radius / 66) * 14;
  } else {
    // Outer scatter halo
    radius  = 66 + Math.random() * 32;
    ySpread = 20;
  }

  // Spiral offset: outer particles rotated further around arm
  const spiral = (radius / 66) * 1.8;
  const scatter = (Math.random() - 0.5) * 0.9;

  aAngle[i]  = armBase + spiral + scatter;
  aRadius[i] = radius;
  aY[i]      = (Math.random() - 0.5) * ySpread;
  aSpeed[i]  = (0.08 + Math.random() * 0.12) / Math.max(radius * 0.6, 1) * 6; // inner=faster

  // Size: nucleus particles bigger, halo tiny
  const baseSize = radius < 10 ? 1.2 + Math.random() * 1.0
                 : radius < 66 ? 0.4 + Math.random() * Math.random() * 1.6
                 :               0.2 + Math.random() * 0.5;
  aSize[i] = baseSize;

  // Color: nucleus warm white → arm gold/blue → halo blush
  let c;
  if (radius < 10) {
    c = palettes[4].clone().lerp(palettes[0], Math.random() * 0.4);
  } else if (radius < 35) {
    c = palettes[0].clone().lerp(palettes[1], Math.random());
  } else if (radius < 66) {
    c = palettes[1].clone().lerp(palettes[2], Math.random() * 0.6);
  } else {
    c = palettes[2].clone().lerp(palettes[3], Math.random());
    c.multiplyScalar(0.6);
  }

  aColor[i*3]   = c.r;
  aColor[i*3+1] = c.g;
  aColor[i*3+2] = c.b;
}

// Dummy position — actual position computed in vertex shader
geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 3), 3));
geo.setAttribute('aSize',    new THREE.BufferAttribute(aSize,  1));
geo.setAttribute('aAngle',   new THREE.BufferAttribute(aAngle, 1));
geo.setAttribute('aRadius',  new THREE.BufferAttribute(aRadius,1));
geo.setAttribute('aY',       new THREE.BufferAttribute(aY,     1));
geo.setAttribute('aSpeed',   new THREE.BufferAttribute(aSpeed, 1));
geo.setAttribute('aColor',   new THREE.BufferAttribute(aColor, 3));

const galaxy = new THREE.Points(geo, mat);
scene.add(galaxy);

/* ─── DUST BACKGROUND ─── */
// Tiny distant stars — simple PointsMaterial, much cheaper
const bgGeo   = new THREE.BufferGeometry();
const bgPos   = new Float32Array(4000 * 3);
for (let i = 0; i < 4000; i++) {
  const r = 180 + Math.random() * 600;
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  bgPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  bgPos[i*3+1] = r * Math.cos(phi);
  bgPos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
const bgMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.22, transparent: true, opacity: 0.35,
  blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Points(bgGeo, bgMat));

/* ─── MOUSE ─── */
const mouse      = new THREE.Vector2(0, 0);
let   targetForce = 0;
let   currentForce = 0;

window.addEventListener('mousemove', e => {
  mouse.set(
    (e.clientX / innerWidth)  * 2 - 1,
   -(e.clientY / innerHeight) * 2 + 1
  );
  targetForce = 1;
});

window.addEventListener('mouseleave', () => { targetForce = 0; });

// Touch support
window.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouse.set(
    (t.clientX / innerWidth)  * 2 - 1,
   -(t.clientY / innerHeight) * 2 + 1
  );
  targetForce = 1;
}, { passive: true });
window.addEventListener('touchend', () => { targetForce = 0; });

/* ─── CAMERA DRIFT ─── */
let camTheta = 0;
let camTY    = 55;
let targetCamTY = 55;

window.addEventListener('mousemove', e => {
  targetCamTY = 35 + (e.clientY / innerHeight) * 50;
});

/* ─── RENDER LOOP ─── */
let t = 0;
function loop() {
  requestAnimationFrame(loop);
  t += 0.0014;

  // Slow camera orbit
  camTheta += 0.00018;
  camTY    += (targetCamTY - camTY) * 0.03;

  const camR = 165;
  camera.position.set(
    Math.sin(camTheta) * camR,
    camTY,
    Math.cos(camTheta) * camR
  );
  camera.lookAt(0, 0, 0);

  // Smooth force
  currentForce += (targetForce - currentForce) * 0.08;

  mat.uniforms.uTime.value  = t;
  mat.uniforms.uMouse.value.set(mouse.x, mouse.y);
  mat.uniforms.uForce.value = currentForce;

  renderer.render(scene, camera);
}
loop();

/* ─── RESIZE ─── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  mat.uniforms.uDPR.value = renderer.getPixelRatio();
});
</script>
</body>
</html>
