<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Dust — Premium</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@200;300;400&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #f0c060;
  --gold-dim: rgba(240,192,96,0.15);
  --blue: #5ab4ff;
  --rose: #ff6eb0;
  --void: #03020d;
}

html, body {
  width: 100%; height: 100%;
  background: var(--void);
  overflow: hidden;
  cursor: none;
}

/* ── CUSTOM CURSOR ── */
#cursor {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--gold);
  transform: translate(-50%, -50%);
  transition: transform 0.08s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
  mix-blend-mode: screen;
}
#cursor-ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid rgba(240,192,96,0.4);
  transform: translate(-50%, -50%);
  transition: transform 0.18s cubic-bezier(0.23,1,0.32,1), width 0.4s ease, height 0.4s ease, border-color 0.3s ease;
}
body:hover #cursor-ring { border-color: rgba(240,192,96,0.7); }

/* ── CANVAS ── */
#webgl-canvas {
  position: absolute; inset: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
}

/* ── DEPTH FOG OVERLAY ── */
#depth-vignette {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  background: radial-gradient(ellipse 90% 80% at 50% 50%,
    transparent 30%,
    rgba(3,2,13,0.35) 65%,
    rgba(3,2,13,0.85) 100%
  );
}

/* ── GRAIN TEXTURE ── */
#grain {
  position: absolute; inset: -50%; z-index: 3; pointer-events: none;
  width: 200%; height: 200%;
  opacity: 0.028;
  animation: grain-shift 0.8s steps(1) infinite;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px 180px;
}
@keyframes grain-shift {
  0%,100% { transform: translate(0,0); }
  10% { transform: translate(-3%,-4%); }
  20% { transform: translate(-5%,2%); }
  30% { transform: translate(4%,-1%); }
  40% { transform: translate(-2%,5%); }
  50% { transform: translate(-4%,-3%); }
  60% { transform: translate(3%,3%); }
  70% { transform: translate(1%,-5%); }
  80% { transform: translate(-3%,2%); }
  90% { transform: translate(4%,1%); }
}

/* ── STATUS INDICATORS ── */
#status-bar {
  position: absolute; top: 32px; left: 50%;
  transform: translateX(-50%);
  z-index: 20; display: flex; align-items: center; gap: 10px;
  opacity: 0; transition: opacity 1s ease;
}
#status-bar.visible { opacity: 1; }
#status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #444; transition: background 0.5s ease, box-shadow 0.5s ease;
}
#status-dot.active {
  background: #7fff7f;
  box-shadow: 0 0 8px #7fff7f, 0 0 20px rgba(127,255,127,0.3);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; } 50% { opacity: 0.5; }
}
#status-text {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.6rem; font-weight: 200; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
}

/* ── CORNER ACCENTS ── */
.corner {
  position: absolute; z-index: 20; width: 22px; height: 22px; pointer-events: none;
  opacity: 0; transition: opacity 1.5s ease;
}
.corner.visible { opacity: 0.4; }
.corner-tl { top: 22px; left: 22px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-tr { top: 22px; right: 22px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
.corner-bl { bottom: 22px; left: 22px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
.corner-br { bottom: 22px; right: 22px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

/* ── HAND AURA (ripple when hand detected) ── */
#hand-aura {
  position: absolute; z-index: 4; pointer-events: none;
  width: 120px; height: 120px; border-radius: 50%;
  border: 1px solid rgba(240,192,96,0.0);
  transform: translate(-50%, -50%);
  transition: border-color 0.4s ease;
  display: none;
}
#hand-aura.active {
  display: block; border-color: rgba(240,192,96,0.25);
  animation: aura-pulse 2s ease-out infinite;
}
@keyframes aura-pulse {
  0% { transform: translate(-50%,-50%) scale(0.7); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
}

/* ── INTRO OVERLAY ── */
#ui {
  position: absolute; inset: 0; z-index: 30;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--void);
  transition: opacity 1.6s cubic-bezier(0.76,0,0.24,1), visibility 1.6s ease;
}
#ui.hidden { opacity: 0; visibility: hidden; }

/* Logo mark */
.logo-mark {
  width: 56px; height: 56px; margin-bottom: 36px; position: relative;
}
.logo-mark svg { width: 100%; height: 100%; animation: logo-spin 16s linear infinite; }

.tagline {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.6rem; font-weight: 200; letter-spacing: 0.45em; text-transform: uppercase;
  color: rgba(240,192,96,0.55); margin-bottom: 16px;
  animation: fade-up 1s ease 0.2s both;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 200; letter-spacing: 0.12em;
  text-transform: uppercase; line-height: 1;
  background: linear-gradient(135deg, #f0c060 0%, #ffffff 45%, #5ab4ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 52px;
  animation: fade-up 1s ease 0.35s both;
}

.divider {
  width: 1px; height: 42px;
  background: linear-gradient(to bottom, transparent, rgba(240,192,96,0.5), transparent);
  margin-bottom: 52px;
  animation: fade-in 1s ease 0.5s both;
}

.btn-wrap {
  position: relative;
  animation: fade-up 1s ease 0.55s both;
}
.btn-glow {
  position: absolute; inset: -12px; border-radius: 60px;
  background: radial-gradient(ellipse, rgba(240,192,96,0.08) 0%, transparent 70%);
  pointer-events: none; opacity: 0;
  transition: opacity 0.4s ease;
}
.btn-wrap:hover .btn-glow { opacity: 1; }

.btn {
  position: relative; z-index: 1;
  padding: 14px 52px; font-family: 'Montserrat', sans-serif;
  font-size: 0.68rem; font-weight: 300; letter-spacing: 0.3em; text-transform: uppercase;
  background: transparent; color: rgba(255,255,255,0.7);
  border: 1px solid rgba(240,192,96,0.25); border-radius: 60px;
  cursor: none; transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
  overflow: hidden;
}
.btn::before {
  content: '';
  position: absolute; inset: 0; border-radius: 60px;
  background: linear-gradient(135deg, rgba(240,192,96,0.08), transparent);
  opacity: 0; transition: opacity 0.4s ease;
}
.btn:hover { border-color: rgba(240,192,96,0.7); color: var(--gold); }
.btn:hover::before { opacity: 1; }
.btn:active { transform: scale(0.97); }

#loader {
  width: 24px; height: 24px; margin-top: 32px;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-top-color: rgba(240,192,96,0.7); border-radius: 50%;
  animation: spin 1s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BOTTOM HINT ── */
#hint {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  z-index: 20; text-align: center; opacity: 0;
  transition: opacity 1.2s ease;
}
#hint.visible { opacity: 1; }
#hint p {
  font-family: 'Montserrat', sans-serif;
  font-size: 0.58rem; font-weight: 200; letter-spacing: 0.28em; text-transform: uppercase;
  color: rgba(255,255,255,0.2);
}

/* ── SCROLL REVEAL KEYFRAMES ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes logo-spin {
  to { transform: rotate(360deg); }
}

video { display: none; }
</style>
</head>
<body>

<!-- Cursor -->
<div id="cursor"></div>
<div id="cursor-ring"></div>

<!-- Grain -->
<div id="grain"></div>

<!-- Canvas -->
<canvas id="webgl-canvas"></canvas>

<!-- Depth vignette -->
<div id="depth-vignette"></div>

<!-- Corner marks -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Dormant</span>
</div>

<!-- Hand aura -->
<div id="hand-aura"></div>

<!-- Hidden video -->
<video id="video" playsinline autoplay muted></video>

<!-- Hint -->
<div id="hint">
  <p>Move your hand to sculpt the field</p>
</div>

<!-- Intro UI -->
<div id="ui">
  <div class="logo-mark">
    <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="27" stroke="rgba(240,192,96,0.2)" stroke-width="0.5"/>
      <circle cx="28" cy="28" r="18" stroke="rgba(90,180,255,0.2)" stroke-width="0.5"/>
      <circle cx="28" cy="28" r="2.5" fill="rgba(240,192,96,0.8)"/>
      <line x1="28" y1="1" x2="28" y2="10" stroke="rgba(240,192,96,0.6)" stroke-width="0.8"/>
      <line x1="28" y1="46" x2="28" y2="55" stroke="rgba(240,192,96,0.6)" stroke-width="0.8"/>
      <line x1="1" y1="28" x2="10" y2="28" stroke="rgba(90,180,255,0.6)" stroke-width="0.8"/>
      <line x1="46" y1="28" x2="55" y2="28" stroke="rgba(90,180,255,0.6)" stroke-width="0.8"/>
      <line x1="8" y1="8" x2="15" y2="15" stroke="rgba(240,192,96,0.3)" stroke-width="0.6"/>
      <line x1="41" y1="41" x2="48" y2="48" stroke="rgba(240,192,96,0.3)" stroke-width="0.6"/>
    </svg>
  </div>
  <p class="tagline">Particle Field v2 — Premium</p>
  <h1>Cosmic Dust</h1>
  <div class="divider"></div>
  <div class="btn-wrap">
    <div class="btn-glow"></div>
    <button class="btn" id="start-btn">Awaken</button>
  </div>
  <div id="loader"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   CURSOR
══════════════════════════════════════════════ */
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

// Ring follows with lag
(function ringLoop() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(ringLoop);
})();

document.querySelectorAll('.btn, #start-btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '6px';
    cursor.style.height = '6px';
    ring.style.width = '56px';
    ring.style.height = '56px';
    ring.style.borderColor = 'rgba(240,192,96,0.9)';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '10px';
    cursor.style.height = '10px';
    ring.style.width = '38px';
    ring.style.height = '38px';
    ring.style.borderColor = 'rgba(240,192,96,0.4)';
  });
});

/* ══════════════════════════════════════════════
   THREE.JS ENGINE — PREMIUM UPGRADE
══════════════════════════════════════════════ */
const canvas = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({
  canvas, alpha: true, antialias: false,
  powerPreference: "high-performance"
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.z = 145;

/* ── MULTI-LAYER PARTICLE SYSTEM ── */
const PARTICLE_COUNT = 18000; // Denser field
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const basePositions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);

// Premium 4-color palette with depth stratification
const cGold  = new THREE.Color("#f5c842");
const cBlue  = new THREE.Color("#5ab4ff");
const cRose  = new THREE.Color("#ff80c0");
const cWhite = new THREE.Color("#ffffff");

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;

  // Three structural layers for depth
  const layer = Math.random();
  let x, y, z;

  if (layer < 0.60) {
    // Main torus ring — dense equator
    const radius = 28 + Math.pow(Math.random(), 1.5) * 28;
    const theta = Math.random() * Math.PI * 2;
    const yOff = (Math.random() - 0.5) * Math.pow(Math.random(), 2) * 22;
    x = radius * Math.cos(theta);
    y = yOff;
    z = radius * Math.sin(theta);
  } else if (layer < 0.82) {
    // Outer halo — sparse, larger radius
    const radius = 58 + Math.random() * 28;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * Math.PI * 0.7;
    x = radius * Math.cos(theta) * Math.cos(phi);
    y = radius * Math.sin(phi) * 0.5;
    z = radius * Math.sin(theta) * Math.cos(phi);
  } else {
    // Core — tight bright center cluster
    const r = Math.pow(Math.random(), 2) * 14;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    x = r * Math.sin(phi) * Math.cos(theta);
    y = r * Math.cos(phi) * 0.6;
    z = r * Math.sin(phi) * Math.sin(theta);
  }

  positions[i3] = x; positions[i3+1] = y; positions[i3+2] = z;
  basePositions[i3] = x; basePositions[i3+1] = y; basePositions[i3+2] = z;

  // Color by structural layer with smooth blending
  let c;
  if (layer < 0.60) {
    c = cGold.clone().lerp(cBlue, Math.random() * 0.7);
  } else if (layer < 0.82) {
    c = cBlue.clone().lerp(cRose, Math.random());
    c.multiplyScalar(0.55); // Dim the halo
  } else {
    c = cWhite.clone().lerp(cGold, Math.random() * 0.5);
  }
  colors[i3] = c.r; colors[i3+1] = c.g; colors[i3+2] = c.b;

  // Variable sizes for sparkle effect
  sizes[i] = 0.3 + Math.random() * Math.random() * 1.4;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// Custom shader material for variable point sizes & glow
const shaderMaterial = new THREE.ShaderMaterial({
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  uniforms: {
    uTime: { value: 0 },
    uPixelRatio: { value: renderer.getPixelRatio() }
  },
  vertexShader: `
    attribute vec3 color;
    varying vec3 vColor;
    uniform float uTime;
    uniform float uPixelRatio;

    // Simple per-particle size variation via gl_VertexID trick
    float hash(float n) { return fract(sin(n) * 43758.5453123); }

    void main() {
      vColor = color;
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      float dist = length(position.xz);
      float twinkle = 0.7 + 0.3 * sin(uTime * 3.0 + dist * 0.4 + position.y);
      // Size: near center slightly larger, outer halo small
      float sz = (1.2 - clamp(dist / 90.0, 0.0, 1.0) * 0.6) * twinkle;
      gl_PointSize = sz * uPixelRatio * 180.0 / -mvPos.z;
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      // Soft disc with bright core — smooth glow
      vec2 uv = gl_PointCoord - 0.5;
      float d = length(uv);
      if (d > 0.5) discard;
      float alpha = 1.0 - smoothstep(0.0, 0.5, d);
      alpha = pow(alpha, 1.4); // Sharpen center
      gl_FragColor = vec4(vColor * (0.7 + alpha * 0.3), alpha * 0.88);
    }
  `
});

const particleSystem = new THREE.Points(geometry, shaderMaterial);
particleSystem.rotation.x = 0.38;
scene.add(particleSystem);

/* ── PHYSICS STATE ── */
let handActive = false;
let handPos3D = new THREE.Vector3();
let prevHandPos3D = new THREE.Vector3();
let handVelocity = new THREE.Vector3();
let handInfluence = 0; // Smooth on/off
let time = 0;

/* ── CAMERA FLOAT ── */
let targetCamX = 0, targetCamY = 0;
document.addEventListener('mousemove', e => {
  targetCamX = (e.clientX / window.innerWidth - 0.5) * 6;
  targetCamY = -(e.clientY / window.innerHeight - 0.5) * 4;
});

function animate() {
  requestAnimationFrame(animate);
  time += 0.0018;
  shaderMaterial.uniforms.uTime.value = time;

  // Gentle galaxy rotation — slightly breathing speed
  particleSystem.rotation.y = time * 0.55;

  // Smooth camera parallax
  camera.position.x += (targetCamX - camera.position.x) * 0.04;
  camera.position.y += (targetCamY - camera.position.y) * 0.04;
  camera.lookAt(0, 0, 0);

  const posAttr = geometry.attributes.position;
  const pos = posAttr.array;

  // Hand influence easing
  handInfluence += (handActive ? 1 : 0 - handInfluence) * 0.07;

  handVelocity.subVectors(handPos3D, prevHandPos3D);
  prevHandPos3D.copy(handPos3D);

  const localHand = handPos3D.clone();
  particleSystem.worldToLocal(localHand);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    const px = pos[i3], py = pos[i3+1], pz = pos[i3+2];
    const bx = basePositions[i3], by = basePositions[i3+1], bz = basePositions[i3+2];

    // Spring restoration — slightly different per-particle for organic feel
    const springK = 0.010 + (i % 7) * 0.0004;
    velocities[i3]   += (bx - px) * springK;
    velocities[i3+1] += (by - py) * springK;
    velocities[i3+2] += (bz - pz) * springK;

    // Hand forcefield
    if (handInfluence > 0.01) {
      const dx = px - localHand.x;
      const dy = py - localHand.y;
      const dz = pz - localHand.z;
      const distSq = dx*dx + dy*dy + dz*dz;
      const radiusSq = 1200;

      if (distSq < radiusSq && distSq > 0.01) {
        const t = (radiusSq - distSq) / radiusSq;
        const force = t * t * handInfluence;

        // Swirl: perpendicular to the radius vector in XZ plane (vortex)
        const invDist = 1 / Math.sqrt(distSq);
        const nx = dx * invDist, ny = dy * invDist, nz = dz * invDist;

        // Radial push
        velocities[i3]   += nx * 0.018 * force;
        velocities[i3+1] += ny * 0.018 * force;
        velocities[i3+2] += nz * 0.018 * force;

        // Tangential swirl (curl-like) — creates beautiful vortex
        velocities[i3]   += (-nz) * 0.025 * force;
        velocities[i3+2] += ( nx) * 0.025 * force;

        // Velocity drag (fluid sweep)
        velocities[i3]   += handVelocity.x * force * 0.9;
        velocities[i3+1] += handVelocity.y * force * 0.9;
        velocities[i3+2] += handVelocity.z * force * 0.9;
      }
    }

    // Fluid friction — very smooth, slightly different per layer
    const friction = 0.87;
    velocities[i3]   *= friction;
    velocities[i3+1] *= friction;
    velocities[i3+2] *= friction;

    pos[i3]   += velocities[i3];
    pos[i3+1] += velocities[i3+1];
    pos[i3+2] += velocities[i3+2];
  }

  posAttr.needsUpdate = true;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  shaderMaterial.uniforms.uPixelRatio.value = renderer.getPixelRatio();
});

/* ══════════════════════════════════════════════
   MEDIAPIPE HAND TRACKING
══════════════════════════════════════════════ */
const video = document.getElementById('video');
const raycaster = new THREE.Raycaster();
const interactionPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
const handAura = document.getElementById('hand-aura');

let cameraRunning = false;
let handsModel = null;
let lastVideoTime = -1;

function onHandResults(results) {
  if (results.multiHandLandmarks?.length > 0) {
    if (!handActive) {
      // Rising edge: show aura
      handAura.classList.add('active');
      document.getElementById('status-dot').classList.add('active');
      document.getElementById('status-text').textContent = 'Hand Detected';
    }
    handActive = true;

    const palm = results.multiHandLandmarks[0][9];
    const ndcX = -(palm.x - 0.5) * 2;
    const ndcY = -(palm.y - 0.5) * 2;

    // Position aura on screen
    const screenX = (1 - palm.x) * window.innerWidth;
    const screenY = palm.y * window.innerHeight;
    handAura.style.left = screenX + 'px';
    handAura.style.top = screenY + 'px';

    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    raycaster.ray.intersectPlane(interactionPlane, handPos3D);
    handPos3D.z = 28;
  } else {
    if (handActive) {
      handAura.classList.remove('active');
      document.getElementById('status-dot').classList.remove('active');
      document.getElementById('status-text').textContent = 'Listening';
    }
    handActive = false;
  }
}

async function processVideoFrame() {
  if (cameraRunning && handsModel && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    await handsModel.send({ image: video });
  }
  if (cameraRunning) requestAnimationFrame(processVideoFrame);
}

document.getElementById('start-btn').addEventListener('click', async () => {
  if (cameraRunning) return;
  document.getElementById('start-btn').style.opacity = '0';
  document.getElementById('start-btn').style.pointerEvents = 'none';
  document.getElementById('loader').style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } }
    });
    video.srcObject = stream;

    handsModel = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    handsModel.setOptions({
      maxNumHands: 1, modelComplexity: 0,
      minDetectionConfidence: 0.55, minTrackingConfidence: 0.55
    });
    handsModel.onResults(onHandResults);

    video.onloadedmetadata = () => {
      video.play();
      cameraRunning = true;
      processVideoFrame();

      // Fade out intro
      const ui = document.getElementById('ui');
      ui.classList.add('hidden');

      // Reveal chrome
      setTimeout(() => {
        document.getElementById('status-bar').classList.add('visible');
        document.querySelectorAll('.corner').forEach(c => c.classList.add('visible'));
        document.getElementById('hint').classList.add('visible');
      }, 800);
    };
  } catch (err) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('start-btn').style.opacity = '1';
    document.getElementById('start-btn').style.pointerEvents = 'auto';
    document.getElementById('start-btn').textContent = 'Permission Denied';
  }
});
</script>
</body>
