<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∞</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
canvas{display:block}

#overlay{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;transition:opacity 1.8s cubic-bezier(.76,0,.24,1);
}
#overlay.out{opacity:0;pointer-events:none}

#awaken{
  font:100 13px/1 'Helvetica Neue',sans-serif;
  letter-spacing:.5em;text-transform:uppercase;
  color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);
  background:none;padding:16px 48px;cursor:pointer;
  transition:color .4s,border-color .4s;
}
#awaken:hover{color:#fff;border-color:rgba(255,255,255,.4)}

#shapename{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font:100 clamp(1.8rem,7vw,5.5rem)/1 'Helvetica Neue',sans-serif;
  letter-spacing:.4em;text-transform:uppercase;
  color:rgba(255,255,255,0);pointer-events:none;z-index:10;
  white-space:nowrap;transition:color .25s ease;
}

/* tiny gesture guide bottom — disappears after first morph */
#guide{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;gap:32px;z-index:10;pointer-events:none;
  opacity:0;transition:opacity 1s ease;
}
#guide.show{opacity:1}
#guide.hide{opacity:0}
.gc{display:flex;flex-direction:column;align-items:center;gap:5px}
.gc span{font:200 8px/1 'Helvetica Neue',sans-serif;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,.22)}
</style>
</head>
<body>

<canvas id="c"></canvas>
<video id="v" style="display:none" playsinline autoplay muted></video>

<div id="overlay">
  <button id="awaken">Awaken</button>
</div>

<div id="shapename"></div>

<div id="guide">
  <div class="gc">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="9" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
      <circle cx="11" cy="11" r="2" fill="rgba(255,255,255,.4)"/>
    </svg>
    <span>Fist → Galaxy</span>
  </div>
  <div class="gc">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M11 3v16M3 11h16" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
    </svg>
    <span>Open → Universe</span>
  </div>
  <div class="gc">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M4 11 Q7 6 11 11 Q15 16 18 11" stroke="rgba(255,255,255,.3)" stroke-width=".8" fill="none"/>
    </svg>
    <span>Peace → Liquid</span>
  </div>
  <div class="gc">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="4" y="4" width="14" height="14" rx="2" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
      <path d="M4 11h14M11 4v14" stroke="rgba(255,255,255,.15)" stroke-width=".5"/>
    </svg>
    <span>Point → Grid</span>
  </div>
  <div class="gc">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M6 6 Q11 2 16 6 Q20 11 16 16 Q11 20 6 16 Q2 11 6 6" stroke="rgba(255,255,255,.3)" stroke-width=".8" fill="none"/>
    </svg>
    <span>Thumb → DNA</span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   RENDERER + SCENE
═══════════════════════════════════════════ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:false, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 1);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 60, 170);
camera.lookAt(0, 0, 0);

/* ═══════════════════════════════════════════
   PARTICLE SHADER
═══════════════════════════════════════════ */
const TOTAL = 20000;

const vertShader = `
  uniform float uTime;
  uniform float uDPR;
  uniform float uMorph;       // 0→1 transition progress
  uniform vec3  uHandPos;     // hand in world space
  uniform float uHandActive;
  uniform float uHandOpen;    // 0=fist 1=open

  attribute vec3  aBase;      // current shape target
  attribute vec3  aNext;      // next shape target
  attribute float aSeed;
  attribute float aSizeBase;
  attribute vec3  aCol;
  attribute vec3  aColNext;

  varying vec3  vCol;
  varying float vAlpha;
  varying float vSize;

  // smooth noise
  float hash(float n){return fract(sin(n)*43758.5453);}
  float noise(float x){
    float i=floor(x);float f=fract(x);
    return mix(hash(i),hash(i+1.),f*f*(3.-2.*f));
  }

  void main(){
    // morphed position
    float ease = uMorph*uMorph*(3.0 - 2.0*uMorph); // smoothstep
    vec3 pos = mix(aBase, aNext, ease);

    // organic breathing
    float breath = sin(uTime*0.8 + aSeed*6.28)*0.4;
    pos += normalize(pos + vec3(0.001)) * breath;

    // hand interaction
    if(uHandActive > 0.0){
      vec3 diff = pos - uHandPos;
      float d = length(diff);
      float r = 35.0;
      if(d < r){
        float f = (1.0 - d/r);
        f = f*f;
        if(uHandOpen > 0.5){
          // open hand: push outward like explosion
          pos += normalize(diff) * f * 18.0 * uHandActive;
        } else {
          // fist: attract / suck inward
          pos -= normalize(diff) * f * 14.0 * uHandActive;
        }
      }
    }

    // twinkle
    float twinkle = 0.7 + 0.3*sin(uTime*3.2 + aSeed*13.7);

    vec4 mv = modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = aSizeBase * twinkle * uDPR * (300.0 / -mv.z);
    gl_Position  = projectionMatrix * mv;

    vCol   = mix(aCol, aColNext, ease);
    vAlpha = (0.6 + 0.4*twinkle);
    vSize  = aSizeBase;
  }
`;

const fragShader = `
  varying vec3  vCol;
  varying float vAlpha;
  varying float vSize;

  void main(){
    vec2  uv = gl_PointCoord - 0.5;
    float d  = length(uv);
    if(d > 0.5) discard;

    float core = 1.0 - smoothstep(0.0, 0.15, d);
    float glow = 1.0 - smoothstep(0.0, 0.50, d);
    float a    = core*0.95 + glow*0.5;

    vec3 col = vCol + core*0.5;
    gl_FragColor = vec4(col, a * vAlpha);
  }
`;

const uniforms = {
  uTime:       {value: 0},
  uDPR:        {value: renderer.getPixelRatio()},
  uMorph:      {value: 1.0},
  uHandPos:    {value: new THREE.Vector3()},
  uHandActive: {value: 0},
  uHandOpen:   {value: 0},
};

const mat = new THREE.ShaderMaterial({
  uniforms,
  vertexShader:   vertShader,
  fragmentShader: fragShader,
  transparent:    true,
  depthWrite:     false,
  blending:       THREE.AdditiveBlending,
});

const geo = new THREE.BufferGeometry();

// Buffers
const aBase     = new Float32Array(TOTAL*3);
const aNext     = new Float32Array(TOTAL*3);
const aSeed     = new Float32Array(TOTAL);
const aSizeBase = new Float32Array(TOTAL);
const aCol      = new Float32Array(TOTAL*3);
const aColNext  = new Float32Array(TOTAL*3);
const dummyPos  = new Float32Array(TOTAL*3); // unused, required by THREE

geo.setAttribute('position', new THREE.BufferAttribute(dummyPos, 3));
geo.setAttribute('aBase',    new THREE.BufferAttribute(aBase,    3));
geo.setAttribute('aNext',    new THREE.BufferAttribute(aNext,    3));
geo.setAttribute('aSeed',    new THREE.BufferAttribute(aSeed,    1));
geo.setAttribute('aSizeBase',new THREE.BufferAttribute(aSizeBase,1));
geo.setAttribute('aCol',     new THREE.BufferAttribute(aCol,     3));
geo.setAttribute('aColNext', new THREE.BufferAttribute(aColNext, 3));

scene.add(new THREE.Points(geo, mat));

/* ═══════════════════════════════════════════
   SHAPE GENERATORS
   Each returns array of N*3 floats (positions)
   and N*3 floats (colors)
═══════════════════════════════════════════ */

function hexToRGB(hex){
  const c = new THREE.Color(hex);
  return [c.r, c.g, c.b];
}

// Palettes per shape
const palettes = {
  galaxy:   ['#ffd580','#7fc8ff','#ffffff','#ffb3d9'],
  universe: ['#aad4ff','#ffffff','#ffd580','#c8a0ff'],
  liquid:   ['#00f5d4','#00bbf9','#fee440','#9b5de5'],
  grid:     ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff'],
  dna:      ['#f72585','#7209b7','#3a86ff','#4cc9f0'],
  sphere:   ['#e0c3fc','#8ec5fc','#ffffff','#fbc2eb'],
  tornado:  ['#f8961e','#f3722c','#f94144','#90be6d'],
};

function pickColor(palette, t){
  const p = palettes[palette];
  const idx = Math.floor(t * p.length) % p.length;
  return hexToRGB(p[idx]);
}

function galaxyShape(i, n){
  const t = i/n;
  const arm = Math.floor(Math.random()*3);
  const armAngle = (arm/3)*Math.PI*2;
  const r = 10 + Math.pow(Math.random(),0.7)*60;
  const spiral = (r/60)*2.2;
  const scatter = (Math.random()-.5)*0.7;
  const theta = armAngle + spiral + scatter;
  const y = (Math.random()-.5)*Math.pow(Math.random(),2)*16;
  return {
    pos: [r*Math.cos(theta), y, r*Math.sin(theta)],
    col: pickColor('galaxy', t)
  };
}

function universeShape(i, n){
  const t = i/n;
  // scattered sphere nebula
  const r = 40 + Math.pow(Math.random(),0.5)*80;
  const theta = Math.random()*Math.PI*2;
  const phi   = Math.acos(2*Math.random()-1);
  return {
    pos: [
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.cos(phi)*0.7,
      r*Math.sin(phi)*Math.sin(theta)
    ],
    col: pickColor('universe', t)
  };
}

function liquidShape(i, n){
  const t = i/n;
  // undulating blob — sine wave surface on a sphere
  const theta = Math.random()*Math.PI*2;
  const phi   = Math.random()*Math.PI;
  const baseR = 52;
  const wave  = Math.sin(phi*4 + theta*3)*8 + Math.sin(phi*7)*5;
  const r     = baseR + wave;
  return {
    pos: [
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.cos(phi)*0.8,
      r*Math.sin(phi)*Math.sin(theta)
    ],
    col: pickColor('liquid', t)
  };
}

function gridShape(i, n){
  const t = i/n;
  // 3D grid with slight depth perspective
  const side = Math.ceil(Math.pow(n, 1/3));
  const ix = i % side;
  const iy = Math.floor(i/side) % side;
  const iz = Math.floor(i/(side*side)) % side;
  const s = 90/(side-1);
  return {
    pos: [
      (ix - side/2)*s,
      (iy - side/2)*s*0.6,
      (iz - side/2)*s*0.4
    ],
    col: pickColor('grid', t)
  };
}

function dnaShape(i, n){
  const t = i/n;
  const strand = i % 2;
  const progress = (i/n)*Math.PI*14;
  const r = 28;
  const offset = strand * Math.PI;
  const y = (t-.5)*110;
  return {
    pos: [
      r*Math.cos(progress + offset),
      y,
      r*Math.sin(progress + offset)
    ],
    col: pickColor('dna', t)
  };
}

function sphereShape(i, n){
  const t = i/n;
  // perfect sphere
  const theta = Math.random()*Math.PI*2;
  const phi   = Math.acos(2*Math.random()-1);
  const r     = 62;
  return {
    pos: [
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.cos(phi),
      r*Math.sin(phi)*Math.sin(theta)
    ],
    col: pickColor('sphere', t)
  };
}

function tornadoShape(i, n){
  const t = i/n;
  const y = (t-.5)*100;
  const r = Math.pow(t, 0.7)*55 + 2;
  const theta = t*Math.PI*28;
  return {
    pos: [
      r*Math.cos(theta),
      y,
      r*Math.sin(theta)
    ],
    col: pickColor('tornado', t)
  };
}

const SHAPES = [
  {name:'GALAXY',   fn: galaxyShape},
  {name:'UNIVERSE', fn: universeShape},
  {name:'LIQUID',   fn: liquidShape},
  {name:'GRID',     fn: gridShape},
  {name:'DNA',      fn: dnaShape},
  {name:'SPHERE',   fn: sphereShape},
  {name:'TORNADO',  fn: tornadoShape},
];

let currentShape = 0;
let morphing = false;

// Seed random sizes once
for(let i=0;i<TOTAL;i++){
  aSeed[i] = Math.random()*100;
  aSizeBase[i] = 0.35 + Math.random()*Math.random()*1.8;
}
geo.attributes.aSeed.needsUpdate = true;
geo.attributes.aSizeBase.needsUpdate = true;

function buildShape(shapeFn, buffer, colorBuffer){
  // Reset random seed for reproducibility feel
  for(let i=0;i<TOTAL;i++){
    const {pos, col} = shapeFn(i, TOTAL);
    buffer[i*3]   = pos[0];
    buffer[i*3+1] = pos[1];
    buffer[i*3+2] = pos[2];
    colorBuffer[i*3]   = col[0];
    colorBuffer[i*3+1] = col[1];
    colorBuffer[i*3+2] = col[2];
  }
}

// Init first shape into aBase (and aNext same = no morph at start)
buildShape(SHAPES[0].fn, aBase, aCol);
buildShape(SHAPES[0].fn, aNext, aColNext);
geo.attributes.aBase.needsUpdate = true;
geo.attributes.aNext.needsUpdate = true;
geo.attributes.aCol.needsUpdate  = true;
geo.attributes.aColNext.needsUpdate = true;
uniforms.uMorph.value = 1.0;

/* ═══════════════════════════════════════════
   MORPH ENGINE
═══════════════════════════════════════════ */
let morphProgress  = 1.0;
let morphDuration  = 2.2; // seconds
let morphStart     = 0;
let morphActive    = false;

const shapeName = document.getElementById('shapename');

function triggerMorph(toIndex){
  if(morphing) return;
  morphing = true;

  // current interpolated positions become new aBase
  const ease = morphProgress*morphProgress*(3-2*morphProgress);
  for(let i=0;i<TOTAL;i++){
    const i3=i*3;
    aBase[i3]   = aBase[i3]   + (aNext[i3]   - aBase[i3]  )*ease;
    aBase[i3+1] = aBase[i3+1] + (aNext[i3+1] - aBase[i3+1])*ease;
    aBase[i3+2] = aBase[i3+2] + (aNext[i3+2] - aBase[i3+2])*ease;
    aCol[i3]    = aCol[i3]    + (aColNext[i3]   - aCol[i3]  )*ease;
    aCol[i3+1]  = aCol[i3+1]  + (aColNext[i3+1] - aCol[i3+1])*ease;
    aCol[i3+2]  = aCol[i3+2]  + (aColNext[i3+2] - aCol[i3+2])*ease;
  }

  // build next shape into aNext
  buildShape(SHAPES[toIndex].fn, aNext, aColNext);

  geo.attributes.aBase.needsUpdate    = true;
  geo.attributes.aNext.needsUpdate    = true;
  geo.attributes.aCol.needsUpdate     = true;
  geo.attributes.aColNext.needsUpdate = true;

  morphProgress = 0;
  morphStart    = performance.now();
  morphActive   = true;
  currentShape  = toIndex;

  // flash name
  shapeName.style.color = 'rgba(255,255,255,0.55)';
  shapeName.textContent = SHAPES[toIndex].name;
  setTimeout(()=>{ shapeName.style.color='rgba(255,255,255,0)'; }, 1800);

  // hide guide after first morph
  document.getElementById('guide').classList.add('hide');

  setTimeout(()=>{ morphing = false; }, morphDuration*1000 + 400);
}

/* ═══════════════════════════════════════════
   MEDIAPIPE HAND TRACKING
═══════════════════════════════════════════ */
const video = document.getElementById('v');
let handActive = false;
let handOpen   = false;
let handScreenX = 0.5, handScreenY = 0.5;
let gestureHoldTimer = null;
let lastGesture = '';
let gestureHoldCount = 0;

// Gesture detection from landmarks
function detectGesture(lm){
  // Finger tip/pip indices
  // Thumb=4, Index=8, Middle=12, Ring=16, Pinky=20
  // PIP: Index=6, Middle=10, Ring=14, Pinky=18
  const tips  = [8,12,16,20];
  const pips  = [6,10,14,18];

  let extended = 0;
  for(let j=0;j<4;j++){
    if(lm[tips[j]].y < lm[pips[j]].y) extended++;
  }
  const thumbOut = Math.abs(lm[4].x - lm[2].x) > 0.08;

  // Peace sign: index + middle up, others down
  const peace = lm[8].y < lm[6].y && lm[12].y < lm[10].y &&
                lm[16].y > lm[14].y && lm[20].y > lm[18].y;

  // Point: only index up
  const point = lm[8].y < lm[6].y && lm[12].y > lm[10].y &&
                lm[16].y > lm[14].y && lm[20].y > lm[18].y;

  // Fist: all down
  const fist = extended === 0;

  // Open: all up
  const open = extended >= 4;

  // Thumb only
  const thumbOnly = thumbOut && extended <= 1;

  if(fist)      return 'fist';
  if(open)      return 'open';
  if(peace)     return 'peace';
  if(point)     return 'point';
  if(thumbOnly) return 'thumb';
  return 'none';
}

const gestureToShape = {
  'fist':  0, // galaxy
  'open':  1, // universe
  'peace': 2, // liquid
  'point': 3, // grid
  'thumb': 4, // dna
};

let hands;

function initHands(){
  hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6,
  });
  hands.onResults(onResults);
}

const raycaster = new THREE.Raycaster();
const plane     = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
const handWorld = new THREE.Vector3();

function onResults(r){
  if(r.multiHandLandmarks && r.multiHandLandmarks.length > 0){
    const lm = r.multiHandLandmarks[0];
    handActive = true;

    // Palm center = landmark 9
    const palm = lm[9];
    handScreenX = 1 - palm.x;
    handScreenY = palm.y;

    // Project to world
    const ndcX = (handScreenX)*2 - 1;
    const ndcY = -(handScreenY)*2 + 1;
    raycaster.setFromCamera({x:ndcX, y:ndcY}, camera);
    raycaster.ray.intersectPlane(plane, handWorld);
    handWorld.z = 20;
    uniforms.uHandPos.value.copy(handWorld);
    uniforms.uHandActive.value = 1;

    const gesture = detectGesture(lm);
    const isOpen  = gesture === 'open';
    handOpen = isOpen;
    uniforms.uHandOpen.value = isOpen ? 1 : 0;

    // Hold gesture for 0.6s to morph
    if(gesture !== 'none' && gesture in gestureToShape){
      if(gesture === lastGesture){
        gestureHoldCount++;
        if(gestureHoldCount === 18 && !morphing){ // ~18 frames ≈ 0.6s
          const target = gestureToShape[gesture];
          if(target !== currentShape) triggerMorph(target);
        }
      } else {
        lastGesture      = gesture;
        gestureHoldCount = 0;
      }
    } else {
      gestureHoldCount = 0;
    }

  } else {
    handActive = false;
    uniforms.uHandActive.value = 0;
    gestureHoldCount = 0;
    lastGesture = '';
  }
}

let camRunning = false;
let lastVT = -1;

async function pumpVideo(){
  if(!camRunning) return;
  if(video.currentTime !== lastVT && hands){
    lastVT = video.currentTime;
    await hands.send({image: video});
  }
  requestAnimationFrame(pumpVideo);
}

/* ═══════════════════════════════════════════
   CAMERA + BACKGROUND STARS
═══════════════════════════════════════════ */
// Stars
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(3000*3);
for(let i=0;i<3000;i++){
  const r = 200+Math.random()*700;
  const t = Math.random()*Math.PI*2;
  const p = Math.acos(2*Math.random()-1);
  bgPos[i*3]   = r*Math.sin(p)*Math.cos(t);
  bgPos[i*3+1] = r*Math.cos(p);
  bgPos[i*3+2] = r*Math.sin(p)*Math.sin(t);
}
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos,3));
scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({
  color:0xffffff, size:0.25, transparent:true, opacity:0.3,
  blending:THREE.AdditiveBlending, depthWrite:false
})));

let camTheta = 0;
let camTargetY = 60;
let camY = 60;

/* ═══════════════════════════════════════════
   AUTO CYCLE — if no hand for 12s, cycle
═══════════════════════════════════════════ */
let lastHandTime = 0;
let autoCycleInterval;

function startAutoCycle(){
  autoCycleInterval = setInterval(()=>{
    if(!handActive && !morphing && performance.now() - lastHandTime > 12000){
      const next = (currentShape+1) % SHAPES.length;
      triggerMorph(next);
    }
  }, 4000);
}

/* ═══════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════ */
let running = false;
function loop(ts){
  if(!running) return;
  requestAnimationFrame(loop);

  const t = ts * 0.001;
  uniforms.uTime.value = t;

  // Morph progress
  if(morphActive){
    const elapsed = (performance.now() - morphStart) * 0.001;
    morphProgress = Math.min(elapsed / morphDuration, 1.0);
    uniforms.uMorph.value = morphProgress;
    if(morphProgress >= 1.0) morphActive = false;
  }

  // Slow camera orbit + tilt from hand
  camTheta += 0.00022;
  const targetY = handActive
    ? 20 + handScreenY * 80
    : 55;
  camTargetY = targetY;
  camY += (camTargetY - camY) * 0.025;

  const R = 170;
  camera.position.set(Math.sin(camTheta)*R, camY, Math.cos(camTheta)*R);
  camera.lookAt(0, 0, 0);

  if(handActive) lastHandTime = performance.now();

  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
document.getElementById('awaken').addEventListener('click', async () => {
  const overlay = document.getElementById('overlay');
  overlay.classList.add('out');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user', width:{ideal:480}, height:{ideal:360}}
    });
    video.srcObject = stream;
    initHands();

    video.onloadedmetadata = () => {
      video.play();
      camRunning = true;
      pumpVideo();
      setTimeout(()=>{
        document.getElementById('guide').classList.add('show');
      }, 800);
    };
  } catch(e){
    // no camera — still runs with auto cycle
  }

  running = true;
  requestAnimationFrame(loop);
  startAutoCycle();
  // Morph to galaxy shape explicitly to show name
  setTimeout(()=>{ triggerMorph(0); }, 600);
});

window.addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  uniforms.uDPR.value = renderer.getPixelRatio();
});

// Keyboard fallback: 1-7 keys cycle shapes
window.addEventListener('keydown', e=>{
  const n = parseInt(e.key);
  if(n>=1 && n<=7) triggerMorph(n-1);
});
</script>
</body>
