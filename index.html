<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Fluid Galaxy ✨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: #020108;
    overflow: hidden;
    font-family: 'Helvetica Neue', sans-serif;
    color: white;
  }

  /* ── 3D CANVAS & BACKGROUND ── */
  #webgl-canvas {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }

  #bg-glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80vw; height: 80vw;
    background: radial-gradient(circle, rgba(20, 10, 50, 0.4) 0%, rgba(2, 1, 8, 0) 70%);
    z-index: 0; pointer-events: none;
  }

  /* ── HIDDEN UTILS ── */
  #video { display: none; } /* Completely hidden, no visual clutter */

  /* ── ULTRA MINIMAL UI ── */
  #ui {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(2, 1, 8, 0.6); backdrop-filter: blur(12px);
    transition: opacity 1.2s ease, visibility 1.2s ease;
  }

  h1 {
    font-size: 2.2rem; font-weight: 200; letter-spacing: 0.3em; text-transform: uppercase;
    background: linear-gradient(90deg, #f5c842, #4facfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 40px;
  }

  .btn {
    padding: 12px 45px; font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase;
    background: transparent; color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 40px;
    cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .btn:hover {
    background: rgba(255,255,255,0.05); border-color: #f5c842; color: #f5c842;
    box-shadow: 0 0 20px rgba(245, 200, 66, 0.2); transform: scale(1.02);
  }

  /* Subtle loading animation */
  #loader {
    width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #f5c842; border-radius: 50%;
    animation: spin 1s linear infinite; display: none; margin-top: 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="bg-glow"></div>
<canvas id="webgl-canvas"></canvas>
<video id="video" playsinline autoplay muted></video>

<div id="ui">
  <h1>Cosmic Dust</h1>
  <button class="btn" id="start-btn">Awaken</button>
  <div id="loader"></div>
</div>

<script>
/* ══════════════════════════════════════════════
   1. FLUID THREE.JS ENGINE
══════════════════════════════════════════════ */
const canvas = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap pixel ratio for performance

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.z = 140;

// Particle Config - 12,000 is the sweet spot for 60fps fluidity
const PARTICLE_COUNT = 12000; 
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const basePositions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);

// Premium Color Palette (Cosmic Gold & Nebula Blue)
const colorGold = new THREE.Color("#f5c842");
const colorBlue = new THREE.Color("#4facfe");

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  
  // Creates a beautiful, dense torus/galaxy shape instead of a plain sphere
  const radius = 30 + Math.random() * 25;
  const theta = Math.random() * 2 * Math.PI;
  const yOffset = (Math.random() - 0.5) * (Math.random() * 30);
  
  const x = radius * Math.cos(theta);
  const y = yOffset;
  const z = radius * Math.sin(theta);

  positions[i3] = x; positions[i3 + 1] = y; positions[i3 + 2] = z;
  basePositions[i3] = x; basePositions[i3 + 1] = y; basePositions[i3 + 2] = z;

  // Mix colors based on distance from center
  const mixedColor = colorGold.clone().lerp(colorBlue, Math.random());
  colors[i3] = mixedColor.r; colors[i3 + 1] = mixedColor.g; colors[i3 + 2] = mixedColor.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const material = new THREE.PointsMaterial({
  size: 0.6, // Slightly thicker particles
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particleSystem = new THREE.Points(geometry, material);
// Tilt the galaxy slightly for a better 3D perspective
particleSystem.rotation.x = 0.4; 
scene.add(particleSystem);

// Physics & Hand Tracking State
let handActive = false;
let handPos3D = new THREE.Vector3(0, 0, 0);
let prevHandPos3D = new THREE.Vector3(0, 0, 0);
let handVelocity = new THREE.Vector3(0, 0, 0);
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.002;

  // Gentle idle rotation
  particleSystem.rotation.y = time;

  const posAttr = geometry.attributes.position;
  const pos = posAttr.array;

  // Update Hand Velocity for Swirl Physics
  handVelocity.subVectors(handPos3D, prevHandPos3D);
  prevHandPos3D.copy(handPos3D);

  // Convert hand pos to local space of the rotating galaxy
  const localHand = handPos3D.clone();
  particleSystem.worldToLocal(localHand);
  const localVel = handVelocity.clone();
  localVel.applyEuler(particleSystem.rotation.clone().invert());

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    let px = pos[i3], py = pos[i3+1], pz = pos[i3+2];
    const bx = basePositions[i3], by = basePositions[i3+1], bz = basePositions[i3+2];

    // 1. Organic Spring Force (Gently pulls back to original shape)
    velocities[i3] += (bx - px) * 0.012;
    velocities[i3+1] += (by - py) * 0.012;
    velocities[i3+2] += (bz - pz) * 0.012;

    // 2. Fluid Vortex Hand Interaction
    if (handActive) {
      const dx = px - localHand.x;
      const dy = py - localHand.y;
      const dz = pz - localHand.z;
      const distSq = dx*dx + dy*dy + dz*dz;
      const radiusSq = 800; // Forcefield size

      if (distSq < radiusSq) {
        const force = (radiusSq - distSq) / radiusSq;
        
        // Push outward slightly
        velocities[i3] += (dx * 0.02) * force;
        velocities[i3+1] += (dy * 0.02) * force;
        velocities[i3+2] += (dz * 0.02) * force;

        // Drag along with hand velocity (creates the fluid sweeping effect)
        velocities[i3] += localVel.x * force * 0.8;
        velocities[i3+1] += localVel.y * force * 0.8;
        velocities[i3+2] += localVel.z * force * 0.8;
      }
    }

    // 3. Fluid Friction (High friction = looks like liquid)
    velocities[i3] *= 0.86;
    velocities[i3+1] *= 0.86;
    velocities[i3+2] *= 0.86;

    // Apply velocities
    pos[i3] += velocities[i3];
    pos[i3+1] += velocities[i3+1];
    pos[i3+2] += velocities[i3+2];
  }

  posAttr.needsUpdate = true;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ══════════════════════════════════════════════
   2. SILENT AI CAMERA PIPELINE
══════════════════════════════════════════════ */
const video = document.getElementById('video');
const raycaster = new THREE.Raycaster();
const interactionPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

let cameraRunning = false;
let handsModel = null;
let lastVideoTime = -1;

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handActive = true;
    
    // Track the palm (Landmark 9) instead of the finger for a heavier, more stable gravitational pull
    const palm = results.multiHandLandmarks[0][9];
    
    // Normalize coordinates (-1 to 1) and flip X
    const ndcX = -(palm.x - 0.5) * 2; 
    const ndcY = -(palm.y - 0.5) * 2;

    // Project into 3D space
    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    raycaster.ray.intersectPlane(interactionPlane, handPos3D);
    handPos3D.z = 25; // Pull forcefield slightly toward camera
  } else {
    handActive = false;
  }
}

async function processVideoFrame() {
  if (cameraRunning && handsModel && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    await handsModel.send({ image: video });
  }
  if (cameraRunning) requestAnimationFrame(processVideoFrame);
}

document.getElementById('start-btn').addEventListener('click', async () => {
  if (cameraRunning) return;
  
  // UI Changes: Hide button, show spinner
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('loader').style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } } // Low res video = faster AI
    });
    video.srcObject = stream;
    
    handsModel = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    // Optimized AI settings for pure speed
    handsModel.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
    handsModel.onResults(onHandResults);

    video.onloadedmetadata = () => {
      video.play();
      cameraRunning = true;
      processVideoFrame(); 
      
      // Fade out the entire UI gracefully
      const uiLayer = document.getElementById('ui');
      uiLayer.style.opacity = '0';
      setTimeout(() => uiLayer.style.visibility = 'hidden', 1200);
    };
  } catch (err) {
    // If it fails, silently stop the loader and bring the button back. No ugly red text.
    document.getElementById('loader').style.display = 'none';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-btn').textContent = "Access Denied";
  }
});
</script>
</body>
</html>
