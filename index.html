<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Mubarak ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dim: #c9973a;
    --dark: #07050d;
    --glow-gold: 0 0 20px rgba(245, 200, 66, 0.5);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    overflow: hidden;
    font-family: 'Great Vibes', cursive;
  }

  /* ── BACKGROUND ── */
  #paper-texture {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at center, #160c22 0%, #030107 100%);
  }
  #paper-texture::after {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.05; mix-blend-mode: screen; pointer-events: none;
  }

  #vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.95) 100%);
    pointer-events: none;
  }

  /* ── WEBCAM + SKELETON ── */
  #video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0; z-index: 1;
    transform: scaleX(-1); transition: opacity 1s ease;
  }
  #skeleton-canvas {
    position: fixed; inset: 0; z-index: 5; width: 100%; height: 100%;
    pointer-events: none;
  }
  #stars-canvas {
    position: fixed; inset: 0; z-index: 2; width: 100%; height: 100%;
    pointer-events: none; opacity: 0.4;
  }

  /* ── MAIN TEXT CANVAS ── */
  #text-canvas {
    position: fixed; inset: 0; z-index: 4; width: 100%; height: 100%;
    pointer-events: none;
    transition: transform 3s ease-out;
  }
  .finished-zoom { transform: scale(1.03); }

  /* ── UI ── */
  #ui {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #start-screen {
    background: rgba(10, 5, 15, 0.5);
    padding: 40px 50px; border-radius: 16px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(245, 200, 66, 0.15);
    display: flex; flex-direction: column; align-items: center; gap: 25px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    transition: opacity 0.8s, transform 0.8s;
  }
  #start-screen h1 {
    font-family: 'Cinzel Decorative', serif; font-size: 1.8rem; letter-spacing: 0.25em;
    color: var(--gold); text-shadow: var(--glow-gold); text-align: center; margin-bottom: 5px;
  }
  
  .btn-start {
    padding: 14px 50px; font-family: 'Cinzel Decorative', serif; font-size: 1rem; letter-spacing: 0.2em;
    background: linear-gradient(45deg, rgba(245,200,66,0.1), transparent);
    color: var(--gold); border: 1px solid rgba(245,200,66,0.5);
    border-radius: 6px; cursor: pointer; text-shadow: var(--glow-gold);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-start:hover { 
    background: rgba(245,200,66,0.2); border-color: var(--gold);
    box-shadow: 0 0 30px rgba(245,200,66,0.4); transform: translateY(-2px); 
  }

  #status-hint { font-family: sans-serif; font-size: 0.75rem; color: rgba(245, 200, 66, 0.8); letter-spacing: 0.08em; height: 15px; text-align: center;}

  /* ── HAND HINT ── */
  #hand-hint {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Cinzel Decorative', serif; font-size: 1.2rem;
    color: var(--gold); text-shadow: var(--glow-gold);
    opacity: 0; pointer-events: none; transition: opacity 0.8s ease; z-index: 6;
    letter-spacing: 0.1em; text-align: center;
  }

  /* Floating UI Buttons */
  .floating-btn {
    position: fixed; z-index: 20; display: none; padding: 10px 20px;
    font-family: sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(0,0,0,0.7); color: var(--gold-dim); border: 1px solid rgba(245,200,66,0.2);
    border-radius: 6px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;
  }
  .floating-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(0,0,0,0.9); }
  #cam-toggle { bottom: 25px; right: 25px; }
  #replay-btn { bottom: 25px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; }
</style>
</head>
<body>

<div id="paper-texture"></div>
<div id="vignette"></div>
<canvas id="stars-canvas"></canvas>
<video id="video" playsinline autoplay muted></video>

<div id="hand-hint">✨ Raise your hand to the camera to begin...</div>

<canvas id="text-canvas"></canvas>
<canvas id="skeleton-canvas"></canvas>

<div id="ui">
  <div id="start-screen">
    <h1>Ramadan Magic</h1>
    <button class="btn-start" id="start-btn">Reveal ✦</button>
    <p id="status-hint">Please allow camera access when prompted.</p>
  </div>
</div>

<button id="cam-toggle" class="floating-btn">☽ Show Camera</button>
<button id="replay-btn" class="floating-btn">↺ Magic Again</button>

<script>
/* ══════════════════════════════════════════════
   HIGH-DPI CANVAS SETUP
══════════════════════════════════════════════ */
function setupHighDPICanvas(canvas, ctx) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px';
  ctx.scale(dpr, dpr);
}

/* ══════════════════════════════════════════════
   STARS BACKGROUND
══════════════════════════════════════════════ */
const starsCanvas = document.getElementById('stars-canvas');
const sCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  setupHighDPICanvas(starsCanvas, sCtx);
  stars = Array.from({length: 100}, () => ({
    x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
    r: Math.random() * 1.5 + 0.2, speed: Math.random() * 0.003 + 0.001, phase: Math.random() * Math.PI * 2
  }));
}

function animateStars(t) {
  sCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  stars.forEach(s => {
    const a = 0.1 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255, 230, 180, ${a})`; sCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
initStars(); requestAnimationFrame(animateStars);

/* ══════════════════════════════════════════════
   LETTER-BY-LETTER ENGINE (COMPLETELY INVISIBLE UNTIL TRIGGERED)
══════════════════════════════════════════════ */
const tCanvas = document.getElementById('text-canvas');
const tCtx = tCanvas.getContext('2d');
const goldCanvas = document.createElement('canvas');
const goldCtx = goldCanvas.getContext('2d');
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d');

let animReq;
let sparks = [];
let animationTriggered = false; // FLAG TO PREVENT EARLY START

class Spark {
  constructor(x, y, vx, vy) {
    this.x = x + (Math.random() - 0.5) * 8; this.y = y + (Math.random() - 0.5) * 8;
    this.vx = vx + (Math.random() - 0.5) * 3; this.vy = vy + (Math.random() - 0.5) * 3;
    this.life = 1; this.decay = Math.random() * 0.015 + 0.01; this.size = Math.random() * 2.5 + 1;
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.04; this.life -= this.decay; }
  draw(ctx) {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size * Math.max(0, this.life), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255, 215, 0, ${Math.max(0, this.life)})`;
    ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 12; ctx.fill();
  }
}

function resizeTextCanvases() {
  setupHighDPICanvas(tCanvas, tCtx); setupHighDPICanvas(goldCanvas, goldCtx); setupHighDPICanvas(maskCanvas, maskCtx);
}

function preDrawGoldText(cx, cy, fontSize) {
  goldCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  goldCtx.font = `${fontSize}px 'Great Vibes', cursive`;
  goldCtx.textAlign = 'center'; goldCtx.textBaseline = 'middle';

  const grad = goldCtx.createLinearGradient(cx - fontSize*2, cy - fontSize, cx + fontSize*2, cy + fontSize);
  grad.addColorStop(0, '#f5c842'); grad.addColorStop(0.5, '#fffce8'); grad.addColorStop(1, '#ff9900');
  
  goldCtx.fillStyle = grad; goldCtx.shadowColor = 'rgba(245, 200, 66, 0.7)'; goldCtx.shadowBlur = 18;
  goldCtx.fillText('Ramadan', cx, cy - fontSize * 0.6);
  goldCtx.fillText('Mubarak', cx, cy + fontSize * 0.6);

  const subSize = fontSize * 0.16;
  goldCtx.font = `${subSize}px 'Cinzel Decorative', serif`;
  goldCtx.fillStyle = 'rgba(245,200,66,0.9)'; goldCtx.shadowBlur = 10;
  goldCtx.fillText('✦  رمضان مبارك  ✦', cx, cy + fontSize * 1.6);
}

function startHandwriting() {
  cancelAnimationFrame(animReq);
  resizeTextCanvases();
  tCanvas.classList.remove('finished-zoom');
  sparks = [];

  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const fontSize = Math.min(window.innerWidth * 0.18, 180);
  
  preDrawGoldText(cx, cy, fontSize);
  maskCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  tCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); // Ensure completely clear before drawing

  goldCtx.font = `${fontSize}px 'Great Vibes', cursive`;
  const words = [
    { text: "Ramadan", yBase: cy - fontSize * 0.6, chars: [] },
    { text: "Mubarak", yBase: cy + fontSize * 0.6, chars: [] }
  ];

  words.forEach(word => {
    let wTotal = goldCtx.measureText(word.text).width;
    let startX = cx - wTotal / 2;
    for(let i=0; i<word.text.length; i++) {
      let char = word.text[i];
      let pastWidth = goldCtx.measureText(word.text.substring(0, i)).width;
      let currWidth = goldCtx.measureText(word.text.substring(0, i+1)).width;
      let isCapital = char === char.toUpperCase();
      word.chars.push({
        char: char, x: startX + pastWidth, w: currWidth - pastWidth,
        duration: isCapital ? 45 : 20, loops: isCapital ? 3 : 1.5 
      });
    }
  });

  let state = { wIdx: 0, cIdx: 0, t: 0, pause: 0, lastPenX: null, lastPenY: null };

  function renderFrame() {
    tCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    
    if (state.pause > 0) {
      state.pause--;
    } else if (state.wIdx < words.length) {
      let word = words[state.wIdx];
      let charData = word.chars[state.cIdx];
      let prog = state.t / charData.duration;
      let ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
      let penX = charData.x + charData.w * ease;
      let loopAmp = fontSize * (charData.char === charData.char.toUpperCase() ? 0.35 : 0.15);
      let penY = word.yBase - Math.sin(prog * Math.PI * charData.loops) * loopAmp + (fontSize * 0.1);

      maskCtx.globalAlpha = 1; maskCtx.beginPath();
      maskCtx.arc(penX, word.yBase, fontSize * 0.7, 0, Math.PI*2);
      maskCtx.fillStyle = 'white'; maskCtx.shadowColor = 'white'; maskCtx.shadowBlur = 25; maskCtx.fill();

      let vx = state.lastPenX ? (penX - state.lastPenX) * 0.2 : 0;
      let vy = state.lastPenY ? (penY - state.lastPenY) * 0.2 : 0;
      for(let i=0; i<3; i++) sparks.push(new Spark(penX, penY, vx, vy));

      state.lastPenX = penX; state.lastPenY = penY; state.t++;

      if (state.t >= charData.duration) {
        state.t = 0; state.cIdx++;
        if (state.cIdx >= word.chars.length) { state.cIdx = 0; state.wIdx++; state.pause = 35; }
      }
    } else if (state.wIdx === words.length && state.pause === 0) {
      state.t++;
      maskCtx.globalAlpha = Math.min(state.t / 60, 1);
      maskCtx.fillRect(cx - 300, cy + fontSize * 1.2, 600, fontSize);
      if (state.t === 60) {
        tCanvas.classList.add('finished-zoom');
        document.getElementById('replay-btn').style.display = 'block';
        document.getElementById('cam-toggle').style.display = 'block';
      }
    }

    tCtx.globalCompositeOperation = 'source-over';
    tCtx.drawImage(maskCanvas, 0, 0, window.innerWidth, window.innerHeight); 
    tCtx.globalCompositeOperation = 'source-in'; 
    tCtx.drawImage(goldCanvas, 0, 0, window.innerWidth, window.innerHeight); 
    tCtx.globalCompositeOperation = 'source-over'; 

    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update(); sparks[i].draw(tCtx);
      if (sparks[i].life <= 0) sparks.splice(i, 1);
    }

    if (state.wIdx < words.length || state.t < 60 || sparks.length > 0) {
      animReq = requestAnimationFrame(renderFrame);
    }
  }
  animReq = requestAnimationFrame(renderFrame);
}

/* ══════════════════════════════════════════════
   CAMERA & HAND TRACKING TRIGGER
══════════════════════════════════════════════ */
const skCanvas = document.getElementById('skeleton-canvas');
const skCtx = skCanvas.getContext('2d');
const video = document.getElementById('video');
const statusHint = document.getElementById('status-hint');
const handHint = document.getElementById('hand-hint');

let cameraRunning = false;
let isCamVisible = false;
let handsModel = null;
let lastVideoTime = -1;

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4], [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12], [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20], [5,9],[9,13],[13,17]
];

function resizeSkeleton() { setupHighDPICanvas(skCanvas, skCtx); }
resizeSkeleton();

function onHandResults(results) {
  skCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  const landmarks = results.multiHandLandmarks;
  
  // TRIGGER ANIMATION ONLY WHEN HAND IS DETECTED
  if (landmarks && landmarks.length > 0) {
      if (!animationTriggered) {
          animationTriggered = true;
          handHint.style.opacity = '0'; // Hide the "Raise your hand" text
          startHandwriting(); // Trigger the magic!
      }
      
      const videoRatio = video.videoWidth / video.videoHeight;
      const windowRatio = window.innerWidth / window.innerHeight;
      let drawW, drawH, offsetX, offsetY;

      if (windowRatio > videoRatio) {
        drawW = window.innerWidth; drawH = window.innerWidth / videoRatio;
        offsetX = 0; offsetY = (window.innerHeight - drawH) / 2;
      } else {
        drawW = window.innerHeight * videoRatio; drawH = window.innerHeight;
        offsetX = (window.innerWidth - drawW) / 2; offsetY = 0;
      }

      landmarks.forEach(hand => {
        const pts = hand.map(lm => ({ x: offsetX + (1 - lm.x) * drawW, y: offsetY + lm.y * drawH }));

        CONNECTIONS.forEach(([a, b]) => {
          const grad = skCtx.createLinearGradient(pts[a].x, pts[a].y, pts[b].x, pts[b].y);
          grad.addColorStop(0, 'rgba(255, 220, 50, 0.85)'); grad.addColorStop(1, 'rgba(255, 140, 0, 0.85)');
          skCtx.beginPath(); skCtx.moveTo(pts[a].x, pts[a].y); skCtx.lineTo(pts[b].x, pts[b].y);
          skCtx.strokeStyle = grad; skCtx.lineWidth = 2.5; skCtx.shadowColor = '#f5c842'; skCtx.shadowBlur = 10; skCtx.stroke();
        });

        pts.forEach((p, i) => {
          const isTip = [4,8,12,16,20].includes(i);
          skCtx.beginPath(); skCtx.arc(p.x, p.y, isTip ? 6 : 4, 0, Math.PI*2);
          skCtx.fillStyle = isTip ? '#ffffff' : '#ffd700'; skCtx.shadowColor = isTip ? '#ffffff' : '#ff9900';
          skCtx.shadowBlur = 15; skCtx.fill();
        });
      });
  }
}

async function processVideoFrame() {
  if (cameraRunning && handsModel && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    await handsModel.send({ image: video });
  }
  if (cameraRunning) requestAnimationFrame(processVideoFrame);
}

async function initCamera() {
  if (cameraRunning) return;
  statusHint.textContent = 'Requesting camera & waking AI...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream;
    
    handsModel = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    handsModel.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
    handsModel.onResults(onHandResults); // Bind the new logic here

    video.onloadedmetadata = () => {
      video.play();
      cameraRunning = true;
      processVideoFrame(); 
      
      // Hide UI, Show Hint, Text remains invisible!
      document.getElementById('start-screen').style.opacity = '0';
      setTimeout(() => { 
          document.getElementById('start-screen').style.display = 'none'; 
          handHint.style.opacity = '1'; 
      }, 800);
    };

  } catch (err) {
    console.error("Camera Error: ", err);
    statusHint.style.color = '#ff6b6b';
    statusHint.textContent = `Error: ${err.message || 'Camera blocked or not found.'}`;
  }
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
document.getElementById('start-btn').addEventListener('click', () => {
  if (statusHint.textContent.includes('Error')) {
      document.getElementById('start-screen').style.opacity = '0';
      setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 800);
      animationTriggered = true; // Bypass hand check if error
      startHandwriting();
      return;
  }
  initCamera();
});

document.getElementById('cam-toggle').addEventListener('click', (e) => {
  isCamVisible = !isCamVisible;
  video.style.opacity = isCamVisible ? '0.2' : '0'; 
  e.target.textContent = isCamVisible ? '☽ Hide Camera' : '☽ Show Camera';
});

document.getElementById('replay-btn').addEventListener('click', () => {
  document.getElementById('replay-btn').style.display = 'none';
  document.getElementById('cam-toggle').style.display = 'none';
  
  // Clear the canvas totally
  tCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  
  // Reset the trigger so it waits for the hand again
  animationTriggered = false;
  handHint.style.opacity = '1';
});

window.addEventListener('resize', () => { 
  initStars(); resizeSkeleton(); 
  if(animationTriggered) resizeTextCanvases(); 
});
</script>
</body>
</html>
