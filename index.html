<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Hand Interaction ✨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: #050505;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: white;
  }

  /* ThreeJS Canvas */
  #webgl-canvas {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 1;
  }

  /* Background Glow */
  #bg-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(30,10,60,0.5) 0%, rgba(0,0,0,0) 70%);
    z-index: 0; pointer-events: none;
  }

  /* Hidden Camera Feed */
  #video {
    position: absolute; top: 20px; right: 20px;
    width: 240px; border-radius: 12px;
    transform: scaleX(-1); /* Mirror */
    opacity: 0.2; z-index: 10;
    border: 1px solid rgba(255,255,255,0.1);
    transition: opacity 0.3s;
  }
  #video:hover { opacity: 0.8; }

  /* UI Layer */
  #ui {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(5,5,5,0.7);
    backdrop-filter: blur(10px);
    transition: opacity 0.8s;
  }

  h1 {
    font-size: 2.5rem; letter-spacing: 0.1em;
    font-weight: 300; margin-bottom: 10px;
    background: linear-gradient(90deg, #00f2fe, #4facfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  p { color: rgba(255,255,255,0.6); margin-bottom: 30px; letter-spacing: 0.05em; }

  .btn {
    padding: 15px 40px; font-size: 1.1rem; letter-spacing: 0.1em;
    background: transparent; color: #4facfe;
    border: 1px solid #4facfe; border-radius: 30px;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 0 15px rgba(79, 172, 254, 0.2);
  }
  .btn:hover {
    background: rgba(79, 172, 254, 0.1);
    box-shadow: 0 0 25px rgba(79, 172, 254, 0.5);
    transform: scale(1.05);
  }

  #status { margin-top: 15px; font-size: 0.8rem; color: #ff6b6b; }
</style>
</head>
<body>

<div id="bg-glow"></div>
<canvas id="webgl-canvas"></canvas>
<video id="video" playsinline autoplay muted></video>

<div id="ui">
  <h1>Quantum Particles</h1>
  <p>Move your hand to disrupt the 3D galaxy</p>
  <button class="btn" id="start-btn">Initialize AI</button>
  <div id="status">Requires Camera Access (Run on Localhost or HTTPS)</div>
</div>

<script>
/* ══════════════════════════════════════════════
   1. THREE.JS 3D PARTICLE ENGINE
══════════════════════════════════════════════ */
const canvas = document.getElementById('webgl-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
camera.position.z = 120;

// Particle Config
const PARTICLE_COUNT = 15000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const basePositions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);

const colorTheme1 = new THREE.Color("#00f2fe");
const colorTheme2 = new THREE.Color("#4facfe");

// Generate a 3D Sphere of particles
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const i3 = i * 3;
  
  // Random spherical distribution
  const radius = 40 + Math.random() * 20;
  const theta = Math.random() * 2 * Math.PI;
  const phi = Math.acos((Math.random() * 2) - 1);
  
  const x = radius * Math.sin(phi) * Math.cos(theta);
  const y = radius * Math.sin(phi) * Math.sin(theta);
  const z = radius * Math.cos(phi);

  positions[i3] = x;
  positions[i3 + 1] = y;
  positions[i3 + 2] = z;

  basePositions[i3] = x;
  basePositions[i3 + 1] = y;
  basePositions[i3 + 2] = z;

  // Mix colors
  const mixedColor = colorTheme1.clone().lerp(colorTheme2, Math.random());
  colors[i3] = mixedColor.r;
  colors[i3 + 1] = mixedColor.g;
  colors[i3 + 2] = mixedColor.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// Create Particle Material (Glowing Dots)
const material = new THREE.PointsMaterial({
  size: 0.4,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particleSystem = new THREE.Points(geometry, material);
scene.add(particleSystem);

// Hand Interaction State
let handActive = false;
let handPos3D = new THREE.Vector3(0, 0, 0);
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.005;

  // Slowly rotate the entire galaxy
  particleSystem.rotation.y = time * 0.5;
  particleSystem.rotation.z = time * 0.2;

  const posAttr = geometry.attributes.position;
  const pos = posAttr.array;

  // Custom Physics Loop (Runs on CPU for every particle)
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    let px = pos[i3], py = pos[i3+1], pz = pos[i3+2];
    const bx = basePositions[i3], by = basePositions[i3+1], bz = basePositions[i3+2];

    // 1. Spring force (pulls particle back to original shape)
    velocities[i3] += (bx - px) * 0.02;
    velocities[i3+1] += (by - py) * 0.02;
    velocities[i3+2] += (bz - pz) * 0.02;

    // 2. Hand Repulsion Force
    if (handActive) {
      // Because the particle system rotates, we must transform the hand position into local space
      const localHandPos = handPos3D.clone();
      particleSystem.worldToLocal(localHandPos);

      const dx = px - localHandPos.x;
      const dy = py - localHandPos.y;
      const dz = pz - localHandPos.z;
      const distSq = dx*dx + dy*dy + dz*dz;

      const repelRadius = 400; // Radius of forcefield squared
      if (distSq < repelRadius) {
        const force = (repelRadius - distSq) / repelRadius;
        velocities[i3] += (dx / Math.sqrt(distSq)) * force * 1.5;
        velocities[i3+1] += (dy / Math.sqrt(distSq)) * force * 1.5;
        velocities[i3+2] += (dz / Math.sqrt(distSq)) * force * 1.5;
      }
    }

    // 3. Apply Friction (Slows particles down over time)
    velocities[i3] *= 0.88;
    velocities[i3+1] *= 0.88;
    velocities[i3+2] *= 0.88;

    // 4. Update Positions
    pos[i3] += velocities[i3];
    pos[i3+1] += velocities[i3+1];
    pos[i3+2] += velocities[i3+2];
  }

  posAttr.needsUpdate = true;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ══════════════════════════════════════════════
   2. MEDIAPIPE AI + CAMERA PIPELINE
══════════════════════════════════════════════ */
const video = document.getElementById('video');
const statusText = document.getElementById('status');
const uiLayer = document.getElementById('ui');

let cameraRunning = false;
let handsModel = null;
let lastVideoTime = -1;

const raycaster = new THREE.Raycaster();
const zZeroPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

function onHandResults(results) {
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    handActive = true;
    
    // Get the tip of the index finger (Landmark 8)
    const indexFinger = results.multiHandLandmarks[0][8];
    
    // Convert MediaPipe coords (0 to 1) to Normalized Device Coordinates (-1 to 1)
    // We flip X because the webcam is mirrored
    const ndcX = -(indexFinger.x - 0.5) * 2; 
    const ndcY = -(indexFinger.y - 0.5) * 2;

    // Project this 2D screen coordinate into the 3D Three.js world
    raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
    raycaster.ray.intersectPlane(zZeroPlane, handPos3D);
    
    // Pull the forcefield slightly forward toward the camera for a better 3D feel
    handPos3D.z = 20; 

  } else {
    handActive = false; // No hands detected, physics will snap back
  }
}

async function processVideoFrame() {
  if (cameraRunning && handsModel && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    await handsModel.send({ image: video });
  }
  if (cameraRunning) requestAnimationFrame(processVideoFrame);
}

async function startSystem() {
  if (cameraRunning) return;
  statusText.textContent = "Booting Neural Network & Camera...";
  statusText.style.color = "#4facfe";

  try {
    // 1. Manually secure native camera access
    const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } } 
    });
    video.srcObject = stream;
    
    // 2. Load MediaPipe AI
    handsModel = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    handsModel.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
    handsModel.onResults(onHandResults);

    video.onloadedmetadata = () => {
      video.play();
      cameraRunning = true;
      processVideoFrame(); 
      
      // Hide UI Menu
      uiLayer.style.opacity = '0';
      setTimeout(() => uiLayer.style.display = 'none', 800);
    };
  } catch (err) {
    console.error(err);
    statusText.style.color = "#ff6b6b";
    statusText.textContent = "Camera Blocked. Ensure you are on GitHub Pages / HTTPS.";
  }
}

document.getElementById('start-btn').addEventListener('click', startSystem);
</script>
</body>
</html>
