<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Mubarak ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dim: #c9973a;
    --dark: #07050d;
    --glow-gold: 0 0 15px rgba(245, 200, 66, 0.6);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--dark);
    overflow: hidden;
    font-family: 'Great Vibes', cursive;
  }

  /* ── REAL WORLD TEXTURE ── */
  #paper-texture {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at center, #1a1025 0%, #05030a 100%);
    opacity: 0.9;
  }
  #paper-texture::after {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    opacity: 0.04; mix-blend-mode: overlay; pointer-events: none;
  }

  #vignette {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.9) 100%);
    pointer-events: none;
  }

  /* ── WEBCAM + SKELETON ── */
  #video {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0; z-index: 1;
    transform: scaleX(-1); transition: opacity 0.8s ease;
  }
  #skeleton-canvas {
    position: fixed; inset: 0; z-index: 5; width: 100%; height: 100%;
    pointer-events: none;
  }
  #stars-canvas {
    position: fixed; inset: 0; z-index: 2; width: 100%; height: 100%;
    pointer-events: none; opacity: 0.5;
  }

  /* ── MAIN TEXT CANVAS ── */
  #text-canvas {
    position: fixed; inset: 0; z-index: 4; width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── UI ── */
  #ui {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #start-screen {
    background: rgba(10, 5, 15, 0.7);
    padding: 40px 50px; border-radius: 12px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(245, 200, 66, 0.2);
    display: flex; flex-direction: column; align-items: center; gap: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    transition: opacity 0.8s, transform 0.8s;
  }
  #start-screen h1 {
    font-family: 'Cinzel Decorative', serif; font-size: 1.6rem; letter-spacing: 0.2em;
    color: var(--gold); text-shadow: var(--glow-gold); text-align: center; margin-bottom: 5px;
  }
  
  .btn-start {
    padding: 12px 45px; font-family: 'Cinzel Decorative', serif; font-size: 1rem; letter-spacing: 0.15em;
    background: transparent; color: var(--gold); border: 1px solid var(--gold);
    border-radius: 4px; cursor: pointer; text-shadow: var(--glow-gold);
    transition: all 0.4s ease;
  }
  .btn-start:hover { background: rgba(245,200,66,0.15); box-shadow: 0 0 25px rgba(245,200,66,0.5); transform: scale(1.02); }

  #status-hint { font-family: sans-serif; font-size: 0.75rem; color: rgba(245, 200, 66, 0.7); letter-spacing: 0.05em; height: 15px; text-align: center; }

  /* Floating UI Buttons */
  .floating-btn {
    position: fixed; z-index: 20; display: none; padding: 10px 20px;
    font-family: sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(0,0,0,0.6); color: var(--gold-dim); border: 1px solid rgba(245,200,66,0.3);
    border-radius: 6px; cursor: pointer; backdrop-filter: blur(8px); transition: all 0.3s;
  }
  .floating-btn:hover { color: var(--gold); border-color: var(--gold); background: rgba(0,0,0,0.9); }
  #cam-toggle { bottom: 25px; right: 25px; }
  #replay-btn { bottom: 25px; left: 50%; transform: translateX(-50%); font-family: 'Cinzel Decorative', serif; font-size: 0.8rem; }
</style>
</head>
<body>

<div id="paper-texture"></div>
<div id="vignette"></div>
<canvas id="stars-canvas"></canvas>
<video id="video" playsinline autoplay muted></video>

<canvas id="text-canvas"></canvas>
<canvas id="skeleton-canvas"></canvas>

<div id="ui">
  <div id="start-screen">
    <h1>Ramadan Magic</h1>
    <button class="btn-start" id="start-btn">Experience ✦</button>
    <p id="status-hint">Run via Local Server for Hand Tracking AI</p>
  </div>
</div>

<button id="cam-toggle" class="floating-btn">☽ Show Camera</button>
<button id="replay-btn" class="floating-btn">↺ Write Again</button>

<script>
/* ══════════════════════════════════════════════
   STARS BACKGROUND
══════════════════════════════════════════════ */
const starsCanvas = document.getElementById('stars-canvas');
const sCtx = starsCanvas.getContext('2d');
let stars = [];

function initStars() {
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = window.innerHeight;
  stars = Array.from({length: 120}, () => ({
    x: Math.random() * starsCanvas.width,
    y: Math.random() * starsCanvas.height,
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 0.005 + 0.002,
    phase: Math.random() * Math.PI * 2
  }));
}

function animateStars(t) {
  sCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  stars.forEach(s => {
    const a = 0.1 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(255, 230, 180, ${a})`;
    sCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
initStars();
requestAnimationFrame(animateStars);


/* ══════════════════════════════════════════════
   REAL-WORLD HANDWRITING ENGINE
══════════════════════════════════════════════ */
const tCanvas = document.getElementById('text-canvas');
const tCtx = tCanvas.getContext('2d');

// Hidden canvases for the masking trick
const goldCanvas = document.createElement('canvas');
const goldCtx = goldCanvas.getContext('2d');
const maskCanvas = document.createElement('canvas');
const maskCtx = maskCanvas.getContext('2d');

let animReq;
let sparks = [];

class Spark {
  constructor(x, y) {
    this.x = x + (Math.random() - 0.5) * 10;
    this.y = y + (Math.random() - 0.5) * 10;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = (Math.random() - 0.5) * 2 - 0.5;
    this.life = 1;
    this.decay = Math.random() * 0.02 + 0.015;
    this.size = Math.random() * 3 + 1;
  }
  update() { 
    this.x += this.vx; this.y += this.vy; 
    this.vy += 0.05; // Gravity pull down
    this.life -= this.decay; 
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * Math.max(0, this.life), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255, 215, 0, ${Math.max(0, this.life)})`;
    ctx.shadowColor = '#ff9900';
    ctx.shadowBlur = 10;
    ctx.fill();
  }
}

function resizeTextCanvases() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  tCanvas.width = goldCanvas.width = maskCanvas.width = w;
  tCanvas.height = goldCanvas.height = maskCanvas.height = h;
}

// Pre-draws the perfect text that we will slowly reveal
function preDrawGoldText(cx, cy, fontSize, w1, w2) {
  goldCtx.clearRect(0, 0, goldCanvas.width, goldCanvas.height);
  goldCtx.font = `${fontSize}px 'Great Vibes', cursive`;
  goldCtx.textAlign = 'center';
  goldCtx.textBaseline = 'middle';

  // Beautiful gold gradient
  const grad = goldCtx.createLinearGradient(cx - w1, cy - fontSize, cx + w1, cy + fontSize);
  grad.addColorStop(0, '#f5c842');
  grad.addColorStop(0.5, '#fffce8');
  grad.addColorStop(1, '#ff9900');
  
  goldCtx.fillStyle = grad;
  goldCtx.shadowColor = 'rgba(245, 200, 66, 0.6)';
  goldCtx.shadowBlur = 15;
  
  goldCtx.fillText('Ramadan', cx, cy - fontSize * 0.6);
  goldCtx.fillText('Mubarak', cx, cy + fontSize * 0.6);

  // Subtitle
  const subSize = fontSize * 0.18;
  goldCtx.font = `${subSize}px 'Cinzel Decorative', serif`;
  goldCtx.fillStyle = 'rgba(245,200,66,0.8)';
  goldCtx.shadowBlur = 10;
  goldCtx.fillText('✦  رمضان مبارك  ✦', cx, cy + fontSize * 1.6);
}

function startHandwriting() {
  cancelAnimationFrame(animReq);
  resizeTextCanvases();
  sparks = [];

  const cx = tCanvas.width / 2;
  const cy = tCanvas.height / 2;
  const fontSize = Math.min(tCanvas.width * 0.18, 180); // Slightly bigger for realism
  
  goldCtx.font = `${fontSize}px 'Great Vibes', cursive`;
  const w1 = goldCtx.measureText('Ramadan').width;
  const w2 = goldCtx.measureText('Mubarak').width;
  
  preDrawGoldText(cx, cy, fontSize, w1, w2);

  // Reset mask canvas
  maskCtx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
  maskCtx.lineCap = 'round';
  maskCtx.lineJoin = 'round';
  maskCtx.lineWidth = fontSize * 1.5; // Brush must be thick enough to cover cursive height
  maskCtx.strokeStyle = 'white';     // Color doesn't matter, acts as alpha mask
  maskCtx.shadowColor = 'white';
  maskCtx.shadowBlur = 40;           // Soft edge like ink bleeding

  // Setup Animation State
  let state = {
    phase: 1, // 1: Line 1, 2: Line 2, 3: Subtitle
    t: 0,
    duration: 120, // Frames per word (slower = more realistic)
    startX1: cx - w1/2 - 40, endX1: cx + w1/2 + 40, y1: cy - fontSize * 0.6,
    startX2: cx - w2/2 - 40, endX2: cx + w2/2 + 40, y2: cy + fontSize * 0.6,
    lastX: cx - w1/2 - 40, lastY: cy - fontSize * 0.6
  };

  function renderFrame() {
    tCtx.clearRect(0, 0, tCanvas.width, tCanvas.height);
    
    let currentX, currentY;
    
    // Calculate Pen Position
    if (state.phase === 1) {
      let prog = Math.min(state.t / state.duration, 1);
      // Ease out to make it feel like a hand slowing down at the end of the word
      let ease = 1 - Math.pow(1 - prog, 2); 
      
      currentX = state.startX1 + (state.endX1 - state.startX1) * ease;
      // Math.sin creates the handwriting "loops" up and down
      currentY = state.y1 + Math.sin(prog * Math.PI * 8) * (fontSize * 0.15); 
      
      state.t++;
      if (prog >= 1) { state.phase = 2; state.t = 0; state.lastX = state.startX2; state.lastY = state.y2; }

    } else if (state.phase === 2) {
      let prog = Math.min(state.t / state.duration, 1);
      let ease = 1 - Math.pow(1 - prog, 2);
      
      currentX = state.startX2 + (state.endX2 - state.startX2) * ease;
      currentY = state.y2 + Math.sin(prog * Math.PI * 8) * (fontSize * 0.15);
      
      state.t++;
      if (prog >= 1) { state.phase = 3; state.t = 0; }
    } else if (state.phase === 3) {
      // Subtitle reveal
      let prog = Math.min(state.t / 40, 1);
      maskCtx.globalAlpha = prog;
      maskCtx.fillRect(cx - 300, cy + fontSize * 1.2, 600, fontSize);
      state.t++;
    }

    // 1. Draw Brush Stroke on Mask
    if (state.phase < 3) {
      maskCtx.beginPath();
      maskCtx.moveTo(state.lastX, state.lastY);
      maskCtx.lineTo(currentX, currentY);
      maskCtx.stroke();
      
      state.lastX = currentX;
      state.lastY = currentY;

      // Add sparks at the pen tip
      for(let i=0; i<3; i++) sparks.push(new Spark(currentX, currentY));
    }

    // 2. Composite Magic (Mask + Gold = Final)
    tCtx.globalCompositeOperation = 'source-over';
    tCtx.drawImage(maskCanvas, 0, 0); // Draw white mask
    tCtx.globalCompositeOperation = 'source-in'; // Keep only where mask exists
    tCtx.drawImage(goldCanvas, 0, 0); // Fill mask with Gold Text
    tCtx.globalCompositeOperation = 'source-over'; // Reset

    // 3. Draw Sparks over everything
    for (let i = sparks.length - 1; i >= 0; i--) {
      sparks[i].update();
      sparks[i].draw(tCtx);
      if (sparks[i].life <= 0) sparks.splice(i, 1);
    }

    // Continue loop
    if (state.phase < 3 || state.t < 40 || sparks.length > 0) {
      animReq = requestAnimationFrame(renderFrame);
    } else {
      document.getElementById('replay-btn').style.display = 'block';
      document.getElementById('cam-toggle').style.display = 'block';
    }
  }

  animReq = requestAnimationFrame(renderFrame);
}


/* ══════════════════════════════════════════════
   MEDIAPIPE HANDS & CAMERA AI
══════════════════════════════════════════════ */
const skCanvas = document.getElementById('skeleton-canvas');
const skCtx = skCanvas.getContext('2d');
const video = document.getElementById('video');
const statusHint = document.getElementById('status-hint');

let cameraRunning = false;
let isCamVisible = false;

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4], [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12], [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20], [5,9],[9,13],[13,17]
];

function resizeSkeleton() {
  skCanvas.width = window.innerWidth; skCanvas.height = window.innerHeight;
}
resizeSkeleton();

function drawSkeleton(landmarks) {
  skCtx.clearRect(0, 0, skCanvas.width, skCanvas.height);
  if (!landmarks || landmarks.length === 0) return;

  const videoRatio = video.videoWidth / video.videoHeight;
  const windowRatio = skCanvas.width / skCanvas.height;
  let drawW, drawH, offsetX, offsetY;

  if (windowRatio > videoRatio) {
    drawW = skCanvas.width; drawH = skCanvas.width / videoRatio;
    offsetX = 0; offsetY = (skCanvas.height - drawH) / 2;
  } else {
    drawW = skCanvas.height * videoRatio; drawH = skCanvas.height;
    offsetX = (skCanvas.width - drawW) / 2; offsetY = 0;
  }

  landmarks.forEach(hand => {
    const pts = hand.map(lm => ({
      x: offsetX + (1 - lm.x) * drawW, 
      y: offsetY + lm.y * drawH
    }));

    // Glowing lines
    CONNECTIONS.forEach(([a, b]) => {
      const grad = skCtx.createLinearGradient(pts[a].x, pts[a].y, pts[b].x, pts[b].y);
      grad.addColorStop(0, 'rgba(255, 215, 0, 0.8)');
      grad.addColorStop(1, 'rgba(255, 140, 0, 0.8)');
      
      skCtx.beginPath(); skCtx.moveTo(pts[a].x, pts[a].y); skCtx.lineTo(pts[b].x, pts[b].y);
      skCtx.strokeStyle = grad; skCtx.lineWidth = 2.5;
      skCtx.shadowColor = '#f5c842'; skCtx.shadowBlur = 12; skCtx.stroke();
    });

    // Golden Joints
    pts.forEach((p, i) => {
      const isTip = [4,8,12,16,20].includes(i);
      const r = isTip ? 6 : 4;
      skCtx.beginPath(); skCtx.arc(p.x, p.y, r, 0, Math.PI*2);
      skCtx.fillStyle = isTip ? '#ffffff' : '#ffd700';
      skCtx.shadowColor = isTip ? '#ffffff' : '#ff9900';
      skCtx.shadowBlur = 15; skCtx.fill();
    });
  });
}

async function initCamera() {
  if (cameraRunning) return;
  if (window.location.protocol === 'file:') {
    statusHint.style.color = '#ff6b6b';
    statusHint.textContent = "Error: Camera requires localhost or HTTPS.";
    return;
  }

  statusHint.textContent = 'Waking up the AI...';

  try {
    await navigator.mediaDevices.getUserMedia({ video: true });
    
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
    hands.onResults(results => drawSkeleton(results.multiHandLandmarks));

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280, height: 720
    });
    
    cameraRunning = true;
    await camera.start();
    
    document.getElementById('start-screen').style.opacity = '0';
    setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 800);
    startHandwriting();

  } catch (err) {
    statusHint.style.color = '#ff6b6b';
    statusHint.textContent = 'Camera blocked by browser permissions.';
  }
}

/* ══════════════════════════════════════════════
   EVENTS
══════════════════════════════════════════════ */
document.getElementById('start-btn').addEventListener('click', () => {
  if (statusHint.textContent.includes('Error') || statusHint.textContent.includes('blocked')) {
      document.getElementById('start-screen').style.opacity = '0';
      setTimeout(() => { document.getElementById('start-screen').style.display = 'none'; }, 800);
      startHandwriting();
      return;
  }
  initCamera();
});

document.getElementById('cam-toggle').addEventListener('click', (e) => {
  isCamVisible = !isCamVisible;
  video.style.opacity = isCamVisible ? '0.2' : '0'; 
  e.target.textContent = isCamVisible ? '☽ Hide Camera' : '☽ Show Camera';
});

document.getElementById('replay-btn').addEventListener('click', () => {
  document.getElementById('replay-btn').style.display = 'none';
  startHandwriting();
});

window.addEventListener('resize', () => {
  initStars(); resizeSkeleton(); resizeTextCanvases();
});
</script>
</body>
</html>
